name: Run Go tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: podman
    steps:
      - name: Install Go
        uses: 'https://code.forgejo.org/actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417'
        with:
          go-version: '1.26'
      - name: Checkout
        uses: 'https://code.forgejo.org/actions/checkout@v3'
      - name: Test with Go
        run: go test ./...

